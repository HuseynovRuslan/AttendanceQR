server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: React Router owns client-side routes, so any unknown path
    # must return index.html instead of a 404 (e.g. /admin, /activate, /kiosk/:id).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache the entry document, so new deployments are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
